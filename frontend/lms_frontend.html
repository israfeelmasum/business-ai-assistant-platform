<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICT Bangladesh LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .navbar-brand { font-weight: bold; color: #4F46E5 !important; font-size: 24px;}
        .btn-register { background-color: #4F46E5; color: white; border-radius: 8px;}
        .hero-bg { background-color: #EEF2FF; padding: 50px 0; border-radius: 15px; margin-top: 20px;}
    </style>
</head>
<body class="container">

    <nav class="navbar navbar-expand-lg navbar-light mt-3">
        <a class="navbar-brand" href="#">ICT Bangladesh</a>
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link fw-bold" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link fw-bold" href="#">About Us</a></li>
                <li class="nav-item"><a class="nav-link fw-bold" href="#">Courses</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center">
            <a href="#" class="btn btn-register me-3 px-4 py-2">Register</a>
            
            <div class="dropdown">
                <button class="btn btn-outline-primary dropdown-toggle px-4 py-2" type="button" data-bs-toggle="dropdown">Log in</button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">User Login</a></li>
                    <li><a class="dropdown-item text-danger fw-bold" href="#" onclick="showAdminPanel()">Admin Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="landingView" class="hero-bg text-center">
        <h1 class="display-4 fw-bold text-dark">Best Learning Platform<br><span style="color: #4F46E5;">in Bangladesh</span></h1>
        <p class="text-muted mt-3">Learn AI, Software Engineering & more from industry experts.</p>
    </div>

    <div id="adminView" class="mt-5" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-danger">⚙️ LMS Admin Dashboard</h3>
            <button class="btn btn-success" onclick="openFormModal()">+ Insert New Course</button>
        </div>

        <table class="table table-bordered table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>Course Name</th><th>Course Fee</th><th>Discount</th>
                    <th>Duration</th><th>Instructor</th><th>Certificate</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="courseTableBody">
                </tbody>
        </table>
    </div>

    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Insert New Course</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courseForm">
                        <input type="hidden" id="courseId">
                        <div class="mb-2"><label>Course Name</label><input type="text" id="cName" class="form-control" required></div>
                        <div class="row">
                            <div class="col-6 mb-2"><label>Fee</label><input type="text" id="cFee" class="form-control" required></div>
                            <div class="col-6 mb-2"><label>Discount</label><input type="text" id="cDiscount" class="form-control" required></div>
                            <div class="col-6 mb-2"><label>Duration</label><input type="text" id="cDuration" class="form-control" required></div>
                            <div class="col-6 mb-2"><label>Certificate</label><input type="text" id="cCert" class="form-control" placeholder="Yes/No" required></div>
                        </div>
                        <div class="mb-3"><label>Instructor</label><input type="text" id="cInstructor" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">💾 Save & Auto-Sync to Chatbot</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        //const API_URL = "http://127.0.0.1:8003/api/courses";
		// 🚀 PRO-LEVEL FIX: Dynamically construct API URL for live server
        const API_URL = window.location.origin + "/api/courses";
        let courseModal;

        document.addEventListener("DOMContentLoaded", () => {
            courseModal = new bootstrap.Modal(document.getElementById('courseModal'));
        });

        function showAdminPanel() {
            document.getElementById('landingView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
            loadCourses();
        }

        async function loadCourses() {
            const res = await fetch(API_URL);
            const courses = await res.json();
            const tbody = document.getElementById('courseTableBody');
            tbody.innerHTML = "";
            courses.forEach(c => {
                tbody.innerHTML += `<tr>
                    <td class="fw-bold">${c.course_name}</td><td>${c.course_fee}</td><td>${c.discount}</td>
                    <td>${c.duration}</td><td>${c.instructor}</td><td>${c.certificate}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick='editCourse(${JSON.stringify(c)})'>Update</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCourse('${c.id}')">Delete</button>
                    </td>
                </tr>`;
            });
        }

        function openFormModal() {
            document.getElementById('courseForm').reset();
            document.getElementById('courseId').value = "";
            document.getElementById('modalTitle').innerText = "Insert New Course";
            courseModal.show();
        }

        function editCourse(course) {
            document.getElementById('courseId').value = course.id;
            document.getElementById('cName').value = course.course_name;
            document.getElementById('cFee').value = course.course_fee;
            document.getElementById('cDiscount').value = course.discount;
            document.getElementById('cDuration').value = course.duration;
            document.getElementById('cInstructor').value = course.instructor;
            document.getElementById('cCert').value = course.certificate;
            document.getElementById('modalTitle').innerText = "Update Course";
            courseModal.show();
        }

        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('courseId').value;
            const payload = {
                course_name: document.getElementById('cName').value,
                course_fee: document.getElementById('cFee').value,
                discount: document.getElementById('cDiscount').value,
                duration: document.getElementById('cDuration').value,
                instructor: document.getElementById('cInstructor').value,
                certificate: document.getElementById('cCert').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            courseModal.hide();
            loadCourses();
        });

        async function deleteCourse(id) {
            if (confirm("⚠️ Are you sure you want to delete this data? This will also remove it from the AI Chatbot's brain!")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadCourses();
            }
        }
    </script>
</body>
</html>
