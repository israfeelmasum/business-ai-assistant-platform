<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test - ICT BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Base Body Reset and Background Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Background Image Properties */
            background-image: url('./assets/ict-bd-bg.jpg');
            background-size: cover; /* Ensures the image covers the entire screen */
            background-position: center; /* Centers the image */
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Dark Overlay for Better Readability */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6); /* Slate-900 with 60% opacity */
            z-index: 1;
        }

        /* Content Wrapper */
        .content-wrapper {
            z-index: 2; /* Keeps text above the overlay */
            text-align: center;
        }

        /* Typography */
        h1 {
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content-wrapper">
        <h1>ICT Bangladesh Widget Testing 🚀</h1>
    </div>

    <script
        src="./chatbot-widget.js"
        data-api-key="028f6ed39ea031b8f716acf2e03efacd14b3f93fd1f8adda"
        data-api-url="http://localhost:9000/api/v1"
        data-title="AI Assistant"
        data-subtitle="Online">
    </script>
    
</body>
</html>
